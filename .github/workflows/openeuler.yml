# SPDX-License-Identifier: MIT
name: CSB on openEuler
on: [workflow_dispatch, push, pull_request]

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  #
  # Build the image once, reuse it in all later jobs
  #

  build-image:
    name: openeuler-csb image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to github
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short

      - name: Build and push openeuler-csb
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/workflows/openeuler/Dockerfile
          tags:  ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          platforms: linux/amd64

      - name: Set image tag to be used on openEuler job
        id: set-image
        run: |
          IMAGE=${{ steps.meta.outputs.tags }}
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

  #
  # Run tests on openEuler via openeuler-csb image
  #
  openEuler:
    name: OpenEuler Tests
    needs: build-image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test:
          - bm_empty
          - min_mysql_close_dup_0_0
          - min_mysql_getdents64_close_0_0
          - min_mysql_lseek_read_1_0
          - min_mysql_newfstatat_0_1
          - min_mysql_newfstatat_openat_0_1
          - min_mysql_openat_fsync_0_2
          - min_mysql_pread64_faccessat2_0_5
          - min_mysql_read_close_0_0
          - min_mysql_read_write_0_1

    container:
      image: ${{ needs.build-image.outputs.image }}
      volumes:
        - /tmp:/home/csb
        - /boot:/boot
        - /lib/modules:/lib/modules
        - /var/run/docker.sock:/var/run/docker.sock

    steps:
      - name: Test ${{ matrix.test }}
        run: |
          cp -ar /root/csb/* /root/csb/.?* /home/csb
          cd /home/csb && scripts/fg-diff/run-single.sh config/${{ matrix.test }}.json

      - name: Fix artifact permissions
        if: always()
        run: sudo chmod -R a+r /tmp/results/

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: openeuler-results-${{ matrix.test }}
          path: /tmp/results/
